<svg xmlns="http://www.w3.org/2000/svg" width="173.86" height="117.17" viewBox="0 0 173.86 117.17">
  <rect width="173.86" height="117.17" rx="5" fill="#c88a08"/>
  <rect x="7.56" y="7.56" width="158.74" height="102.05" rx="4" fill="#e0a018" fill-opacity="0.3"/>

  <!-- Cactus body — tall central column -->
  <rect x="51" y="22" width="42" height="68" rx="21" fill="#3aaa28"/>
  <!-- Left arm -->
  <rect x="18" y="36" width="38" height="17" rx="8.5" fill="#3aaa28"/>
  <rect x="18" y="25" width="22" height="24" rx="11" fill="#3aaa28"/>
  <!-- Right arm -->
  <rect x="88" y="41" width="38" height="17" rx="8.5" fill="#3aaa28"/>
  <rect x="104" y="30" width="22" height="24" rx="11" fill="#3aaa28"/>

  <!-- Spines -->
  <line x1="50" y1="40" x2="38" y2="32" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="50" y1="52" x2="36" y2="52" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="94" y1="46" x2="106" y2="38" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="94" y1="58" x2="108" y2="58" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="72" y1="22" x2="72" y2="12" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="64" y1="24" x2="59" y2="14" stroke="#c8ff70" stroke-width="1.8"/>
  <line x1="80" y1="24" x2="85" y2="14" stroke="#c8ff70" stroke-width="1.8"/>

  <!-- Flower crown -->
  <circle cx="72" cy="22" r="10" fill="#ff4488"/>
  <circle cx="60" cy="18" r="7.5" fill="#ff4488"/>
  <circle cx="84" cy="18" r="7.5" fill="#ff4488"/>
  <circle cx="72" cy="22" r="6.5" fill="#ffd830"/>

  <!-- Sassy eyes -->
  <ellipse cx="62" cy="54" rx="7.5" ry="8.5" fill="white"/>
  <circle cx="62" cy="56" r="5" fill="#182208"/>
  <circle cx="64.5" cy="52.5" r="1.8" fill="white"/>
  <!-- Raised eyebrow -->
  <path d="M55 45 Q62 41 69 45" stroke="#182208" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="82" cy="54" rx="7.5" ry="8.5" fill="white"/>
  <circle cx="82" cy="56" r="5" fill="#182208"/>
  <circle cx="84.5" cy="52.5" r="1.8" fill="white"/>

  <!-- Smirk -->
  <path d="M62 68 Q74 77 84 72" stroke="#182208" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="48" cy="66" rx="7.5" ry="4.5" fill="#e8b020" fill-opacity="0.65"/>
  <ellipse cx="96" cy="66" rx="7.5" ry="4.5" fill="#e8b020" fill-opacity="0.65"/>

  <!-- Name right -->
  <text x="143" y="56" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="700" fill="white" letter-spacing="0.5">Cleo</text>

  <!-- NFC dot -->
  <circle cx="143" cy="90" r="5" fill="#7a5000"/>
  <circle cx="143" cy="90" r="3" fill="#ffe080" fill-opacity="0.9"/>
  <path d="M135 82 Q143 75 151 82" stroke="#ffe080" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M131 78 Q143 68 155 78" stroke="#ffe080" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>
