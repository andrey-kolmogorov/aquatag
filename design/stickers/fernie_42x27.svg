<svg xmlns="http://www.w3.org/2000/svg" width="173.86" height="117.17" viewBox="0 0 173.86 117.17">
  <rect width="173.86" height="117.17" rx="5" fill="#0a5858"/>
  <rect x="7.56" y="7.56" width="158.74" height="102.05" rx="4" fill="#126868" fill-opacity="0.3"/>

  <!-- Three frond stems -->
  <path d="M72 95 Q72 65 72 18" stroke="#20b868" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M72 88 Q50 65 28 40" stroke="#20b868" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M72 88 Q94 65 116 40" stroke="#20b868" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left frond leaflets -->
  <ellipse cx="44" cy="52" rx="13" ry="5.5" fill="#20b868" transform="rotate(-46 44 52)"/>
  <ellipse cx="56" cy="66" rx="11" ry="5" fill="#28cc78" transform="rotate(-36 56 66)"/>
  <ellipse cx="66" cy="77" rx="10" ry="4.5" fill="#20b868" transform="rotate(-24 66 77)"/>
  <!-- Right frond leaflets -->
  <ellipse cx="100" cy="52" rx="13" ry="5.5" fill="#28cc78" transform="rotate(46 100 52)"/>
  <ellipse cx="88" cy="66" rx="11" ry="5" fill="#20b868" transform="rotate(36 88 66)"/>
  <ellipse cx="78" cy="77" rx="10" ry="4.5" fill="#28cc78" transform="rotate(24 78 77)"/>
  <!-- Centre frond leaflets -->
  <ellipse cx="60" cy="38" rx="11" ry="4.5" fill="#20b868" transform="rotate(-16 60 38)"/>
  <ellipse cx="84" cy="38" rx="11" ry="4.5" fill="#28cc78" transform="rotate(16 84 38)"/>
  <ellipse cx="60" cy="54" rx="10" ry="4" fill="#28cc78" transform="rotate(-10 60 54)"/>
  <ellipse cx="84" cy="54" rx="10" ry="4" fill="#20b868" transform="rotate(10 84 54)"/>

  <!-- Sleepy face at top -->
  <ellipse cx="63" cy="17" rx="7" ry="7.5" fill="white"/>
  <circle cx="63" cy="18.5" r="4.5" fill="#061818"/>
  <ellipse cx="81" cy="17" rx="7" ry="7.5" fill="white"/>
  <circle cx="81" cy="18.5" r="4.5" fill="#061818"/>
  <!-- Droopy eyelids -->
  <path d="M57 12 Q63 9.5 69 12" stroke="#061818" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M75 12 Q81 9.5 87 12" stroke="#061818" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Sleepy smile -->
  <path d="M60 24 Q72 31 84 24" stroke="#061818" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Name right -->
  <text x="143" y="56" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="700" fill="white" letter-spacing="0.5">Fernie</text>

  <!-- NFC dot -->
  <circle cx="143" cy="90" r="5" fill="#052020"/>
  <circle cx="143" cy="90" r="3" fill="#70e8e8" fill-opacity="0.9"/>
  <path d="M135 82 Q143 75 151 82" stroke="#70e8e8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M131 78 Q143 68 155 78" stroke="#70e8e8" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>
