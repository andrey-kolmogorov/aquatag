<svg xmlns="http://www.w3.org/2000/svg" width="147.40" height="147.40" viewBox="0 0 147.40 147.40">
  <!-- 35mm + 2mm bleed = 39mm = 147.40px. Centre: 73.70,73.70 -->
  <defs><clipPath id="mc"><circle cx="73.70" cy="73.70" r="73.70"/></clipPath></defs>
  
  <!-- Full bleed background -->
  <circle cx="73.70" cy="73.70" r="73.70" fill="#1a7a4a"/>
  <!-- Inner glow ring -->
  <circle cx="73.70" cy="73.70" r="60" fill="#24945a" fill-opacity="0.4"/>

  <!-- Monstera leaf — large, fills circle -->
  <ellipse cx="73.70" cy="68" rx="50" ry="46" fill="#2fb060"/>
  <!-- Leaf notches -->
  <path d="M30 46 Q14 56 18 72" stroke="#1a7a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M28 68 Q10 78 16 90" stroke="#1a7a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M117 46 Q133 56 129 72" stroke="#1a7a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M119 68 Q137 78 131 90" stroke="#1a7a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Centre vein -->
  <line x1="73.70" y1="22" x2="73.70" y2="112" stroke="#148040" stroke-width="2.5"/>
  <!-- Side veins -->
  <line x1="73.70" y1="46" x2="48" y2="62" stroke="#148040" stroke-width="1.8"/>
  <line x1="73.70" y1="60" x2="44" y2="74" stroke="#148040" stroke-width="1.8"/>
  <line x1="73.70" y1="46" x2="99" y2="62" stroke="#148040" stroke-width="1.8"/>
  <line x1="73.70" y1="60" x2="103" y2="74" stroke="#148040" stroke-width="1.8"/>

  <!-- Eyes — big and expressive -->
  <ellipse cx="57" cy="62" rx="11" ry="12" fill="white"/>
  <circle cx="57" cy="64" r="7" fill="#0d2a10"/>
  <circle cx="60" cy="60" r="2.8" fill="white"/>
  <ellipse cx="90" cy="62" rx="11" ry="12" fill="white"/>
  <circle cx="90" cy="64" r="7" fill="#0d2a10"/>
  <circle cx="93" cy="60" r="2.8" fill="white"/>

  <!-- Big happy smile -->
  <path d="M55 82 Q73.70 96 92 82" stroke="#0d2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="38" cy="80" rx="11" ry="7" fill="#50c870" fill-opacity="0.6"/>
  <ellipse cx="109" cy="80" rx="11" ry="7" fill="#50c870" fill-opacity="0.6"/>

  <!-- Name at bottom -->
  <text x="73.70" y="122" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="700" fill="white" letter-spacing="1">Monty</text>

  <!-- NFC dot -->
  <circle cx="73.70" cy="137" r="5" fill="#0d4a28"/>
  <circle cx="73.70" cy="137" r="3" fill="#70ffaa" fill-opacity="0.9"/>
</svg>
