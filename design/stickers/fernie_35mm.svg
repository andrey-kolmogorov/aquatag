  <!-- Sleepy smile -->
  <path d="M61 28 Q73.70 37 86 28" stroke="#061818" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <text x="73.70" y="122" text-anchor="middle" font-family="Georgia,serif" font-size="15.5" font-weight="700" fill="white" letter-spacing="1">Fernie</text>
  <circle cx="73.70" cy="137" r="5" fill="#041a1a"/>
