<svg xmlns="http://www.w3.org/2000/svg" width="147.40" height="147.40" viewBox="0 0 147.40 147.40">
  <defs><clipPath id="fc"><circle cx="73.70" cy="73.70" r="73.70"/></clipPath></defs>
  <!-- Darker teal — stronger contrast against pink stake -->
  <circle cx="73.70" cy="73.70" r="73.70" fill="#085050"/>
  <circle cx="73.70" cy="73.70" r="60" fill="#106060" fill-opacity="0.35"/>

  <!-- Three frond stems -->
