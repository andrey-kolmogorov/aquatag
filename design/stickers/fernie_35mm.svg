  <path d="M73.70 100 Q46 72 20 44" stroke="#20c070" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M73.70 100 Q101 72 127 44" stroke="#20c070" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Left frond leaflets -->
  <ellipse cx="38" cy="58" rx="16" ry="7" fill="#20c070" transform="rotate(-46 38 58)"/>
  <ellipse cx="52" cy="74" rx="14" ry="6" fill="#28d880" transform="rotate(-36 52 74)"/>
  <ellipse cx="64" cy="87" rx="12" ry="5.5" fill="#20c070" transform="rotate(-24 64 87)"/>
  <!-- Right frond leaflets -->
  <ellipse cx="109" cy="58" rx="16" ry="7" fill="#28d880" transform="rotate(46 109 58)"/>
  <ellipse cx="95" cy="74" rx="14" ry="6" fill="#20c070" transform="rotate(36 95 74)"/>
  <ellipse cx="83" cy="87" rx="12" ry="5.5" fill="#28d880" transform="rotate(24 83 87)"/>
  <!-- Centre frond leaflets -->
  <ellipse cx="58" cy="42" rx="14" ry="6" fill="#20c070" transform="rotate(-18 58 42)"/>
  <ellipse cx="89" cy="42" rx="14" ry="6" fill="#28d880" transform="rotate(18 89 42)"/>
  <ellipse cx="58" cy="60" rx="12" ry="5" fill="#28d880" transform="rotate(-12 58 60)"/>
  <ellipse cx="89" cy="60" rx="12" ry="5" fill="#20c070" transform="rotate(12 89 60)"/>

  <!-- Sleepy face at top of stem -->
  <ellipse cx="63" cy="19" rx="9" ry="9.5" fill="white"/>
  <circle cx="63" cy="21" r="5.5" fill="#061818"/>
  <ellipse cx="84" cy="19" rx="9" ry="9.5" fill="white"/>
  <circle cx="84" cy="21" r="5.5" fill="#061818"/>
  <!-- Droopy lids -->
