<svg xmlns="http://www.w3.org/2000/svg" width="173.86" height="117.17" viewBox="0 0 173.86 117.17">
  <!-- 42x27mm final + 2mm bleed = 46x31mm canvas at 96dpi -->
  <!-- Cut line at x=7.56, y=7.56, w=158.74, h=102.05 -->
  <!-- Safe zone at x=15.12, y=15.12, w=143.62, h=86.93 -->

  <!-- Background full bleed -->
  <rect width="173.86" height="117.17" rx="5" fill="#1a7a4a"/>
  <!-- Subtle inner depth -->
  <rect x="7.56" y="7.56" width="158.74" height="102.05" rx="4" fill="#22924f" fill-opacity="0.35"/>

  <!-- Monstera leaf — compact, takes up left 55% -->
  <ellipse cx="72" cy="52" rx="42" ry="38" fill="#2fb060"/>
  <!-- Leaf notches left -->
  <path d="M36 32 Q22 40 25 55" stroke="#1a7a4a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M34 55 Q18 63 22 74" stroke="#1a7a4a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Leaf notches right -->
  <path d="M108 32 Q122 40 119 55" stroke="#1a7a4a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M110 55 Q126 63 122 74" stroke="#1a7a4a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Centre vein -->
  <line x1="72" y1="15" x2="72" y2="88" stroke="#148040" stroke-width="2"/>
  <!-- Side veins -->
  <line x1="72" y1="36" x2="50" y2="50" stroke="#148040" stroke-width="1.3"/>
  <line x1="72" y1="48" x2="46" y2="60" stroke="#148040" stroke-width="1.3"/>
  <line x1="72" y1="36" x2="94" y2="50" stroke="#148040" stroke-width="1.3"/>
  <line x1="72" y1="48" x2="98" y2="60" stroke="#148040" stroke-width="1.3"/>

  <!-- Eyes — large, expressive -->
  <ellipse cx="58" cy="48" rx="8.5" ry="9.5" fill="white"/>
  <circle cx="58" cy="50" r="5.5" fill="#0d2a10"/>
  <circle cx="60.5" cy="47" r="2" fill="white"/>
  <ellipse cx="86" cy="48" rx="8.5" ry="9.5" fill="white"/>
  <circle cx="86" cy="50" r="5.5" fill="#0d2a10"/>
  <circle cx="88.5" cy="47" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M58 64 Q72 74 86 64" stroke="#0d2a10" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="44" cy="62" rx="8" ry="5" fill="#50c870" fill-opacity="0.55"/>
  <ellipse cx="100" cy="62" rx="8" ry="5" fill="#50c870" fill-opacity="0.55"/>

  <!-- Name — right side, centred vertically -->
  <text x="143" y="56" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="700" fill="white" letter-spacing="0.5">Monty</text>

  <!-- NFC dot indicator -->
  <circle cx="143" cy="90" r="5" fill="#0d4a28"/>
  <circle cx="143" cy="90" r="3" fill="#70ffaa" fill-opacity="0.9"/>
  <!-- Tap waves -->
  <path d="M135 82 Q143 75 151 82" stroke="#70ffaa" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M131 78 Q143 68 155 78" stroke="#70ffaa" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>
</svg>
